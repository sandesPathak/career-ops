<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 10.5px;
    line-height: 1.55;
    color: #1a1a2e;
    background: #ffffff;
    margin: 0;
  }

  /* 1-page Letter sizing — fill the page; keep monitoring page-count after every regen */
  @page { size: Letter; margin: 0.5in 0.55in; }

  .page { width: 100%; max-width: {{PAGE_WIDTH}}; margin: 0 auto; padding: 0; }

  /* === HEADER === */
  .header { margin-bottom: 18px; }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 5px;
    line-height: 1.05;
  }
  .header-gradient {
    height: 1.5px;
    background: #1a1a2e;
    border-radius: 1px;
    margin-bottom: 9px;
  }
  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    line-height: 1.4;
    color: #555;
  }
  .contact-row a { color: #555; text-decoration: none; }
  .contact-row .separator { color: #ccc; }

  /* === SECTIONS === */
  .section { margin-bottom: 22px; }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #1a1a2e;
    border-bottom: 1px solid #d4d4d4;
    padding-bottom: 6px;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  /* === SUMMARY === */
  .summary-text {
    font-size: 10.5px;
    line-height: 1.6;
    color: #2f2f2f;
  }

  /* === KEYWORDS === */
  .keywords-line {
    font-size: 10px;
    line-height: 1.55;
    color: #444;
    margin-top: 7px;
  }
  .keywords-line strong {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: 0.02em;
  }

  a { white-space: nowrap; }

  /* === WORK EXPERIENCE === */
  .job { margin-bottom: 14px; }
  .job:last-child { margin-bottom: 0; }
  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 3px;
  }
  .job-company {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .job-period {
    font-size: 10px;
    color: #777;
    white-space: nowrap;
  }
  .job-role {
    font-size: 10.5px;
    font-weight: 600;
    color: #333;
    margin-bottom: 7px;
  }
  .job ul { padding-left: 17px; margin-top: 4px; }
  .job li {
    font-size: 10px;
    line-height: 1.55;
    color: #333;
    margin-bottom: 5px;
  }
  .job li strong { font-weight: 600; }

  /* === EDUCATION === */
  .edu-line {
    font-size: 10.5px;
    color: #333;
  }
  .edu-line .edu-org { color: #1a1a2e; font-weight: 500; }
  .edu-line .edu-year { color: #777; font-size: 10px; }

  /* === SKILLS === */
  .skills-strip {
    font-size: 10px;
    line-height: 1.7;
    color: #444;
  }
  .skills-strip strong {
    font-weight: 600;
    color: #333;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }

  .avoid-break, .job, .edu-item { break-inside: avoid; page-break-inside: avoid; }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      <span class="separator">|</span>
      <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
      <span class="separator">|</span>
      <span>{{LOCATION}}</span>
    </div>
  </div>

  <!-- SUMMARY + KEYWORDS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SUMMARY}}</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
    <div class="keywords-line"><strong>Keywords:</strong> {{KEYWORDS_LINE}}</div>
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_SKILLS}}</div>
    <div class="skills-strip">{{SKILLS}}</div>
  </div>

  <!-- EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

</div>
</body>
</html>
